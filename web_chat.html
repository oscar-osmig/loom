<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loom - Knowledge Weaver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: #2e2e2e;
            --user-msg: #6366f1;
            --assistant-msg: #1e1e1e;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .header-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-btn:hover {
            background: var(--bg-primary);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .header-btn.danger:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0 1rem;
        }

        /* Messages Area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            line-height: 1.6;
            animation: slideIn 0.3s ease;
            font-size: 0.9375rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: var(--user-msg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: var(--assistant-msg);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.info {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            align-self: flex-start;
            border-left: 3px solid var(--accent);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8125rem;
            white-space: pre-wrap;
            max-width: 90%;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            align-self: flex-start;
            border-left: 3px solid var(--error);
        }

        .message b {
            color: var(--accent-hover);
            font-weight: 600;
        }

        /* Meta info badge */
        .meta-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            font-size: 0.6875rem;
            padding: 0.25rem 0.625rem;
            border-radius: 100px;
            margin-top: 0.75rem;
            font-weight: 500;
        }

        /* Input Area */
        .input-area {
            padding: 1rem 0 1.5rem;
            flex-shrink: 0;
        }

        .input-wrapper {
            position: relative;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 150px;
            line-height: 1.5;
            padding: 0.75rem;
            padding-right: 5rem;
            padding-bottom: 0.75rem;
            box-sizing: border-box;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            position: absolute;
            right: 0.5rem;
            bottom: 0.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .send-btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        /* Quick commands */
        .quick-commands {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
            padding: 0 0.25rem;
        }

        .quick-cmd {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.375rem 0.875rem;
            border-radius: 100px;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-cmd:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* Loading indicator */
        .typing-indicator {
            display: none;
            padding: 1rem 1.25rem;
            background: var(--assistant-msg);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .typing-indicator.active {
            display: flex;
            gap: 4px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.4; transform: scale(1); }
            40% { opacity: 1; transform: scale(1.1); }
        }

        /* Scrollbar */
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Textarea scrollbar - at far right edge, nearly invisible */
        .input-wrapper textarea {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .input-wrapper textarea::-webkit-scrollbar {
            width: 6px;
        }

        .input-wrapper textarea::-webkit-scrollbar-track {
            background: transparent;
            margin: 8px 0;
        }

        .input-wrapper textarea::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .input-wrapper textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 500px;
            margin: auto;
        }

        .welcome h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .welcome p {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .welcome p b {
            color: var(--accent-hover);
        }

        /* Confirm dialog */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .confirm-overlay.active {
            display: flex;
        }

        .confirm-dialog {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            max-width: 400px;
            width: 90%;
            animation: scaleIn 0.2s ease;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .confirm-dialog h3 {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .confirm-dialog p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .confirm-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        .confirm-actions button {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-cancel:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .btn-confirm {
            background: var(--error);
            border: none;
            color: white;
        }

        .btn-confirm:hover {
            background: #dc2626;
        }

        /* Mobile responsiveness */
        @media (max-width: 640px) {
            .header {
                padding: 0.875rem 1rem;
            }

            .logo-text p {
                display: none;
            }

            .header-btn span {
                display: none;
            }

            .message {
                max-width: 90%;
            }

            .welcome {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">L</div>
                <div class="logo-text">
                    <h1>Loom</h1>
                    <p>Knowledge Weaver</p>
                </div>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="quickCmd('stats')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 20V10M12 20V4M6 20v-6"/>
                </svg>
                <span>Stats</span>
            </button>
            <button class="header-btn danger" onclick="showClearConfirm()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
                <span>Clear</span>
            </button>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome">
                <h2>Welcome to Loom</h2>
                <p>Teach me facts, ask questions, or paste paragraphs. I'll weave them into a connected knowledge graph. Type <b>help</b> for commands.</p>
            </div>
            <div class="typing-indicator" id="typing">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="input"
                    placeholder="Teach me something or ask a question..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                    Send
                </button>
            </div>
            <div class="quick-commands">
                <span class="quick-cmd" onclick="quickCmd('help')">help</span>
                <span class="quick-cmd" onclick="quickCmd('show')">show knowledge</span>
                <span class="quick-cmd" onclick="quickCmd('activation')">activation</span>
                <span class="quick-cmd" onclick="quickCmd('weights')">weights</span>
            </div>
        </div>
    </div>

    <!-- Clear confirmation dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <h3>Clear chat?</h3>
            <p>This will clear the conversation history. Your knowledge will be preserved.</p>
            <div class="confirm-actions">
                <button class="btn-cancel" onclick="hideClearConfirm()">Cancel</button>
                <button class="btn-confirm" onclick="clearChat()">Clear Chat</button>
            </div>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typing');
        const confirmOverlay = document.getElementById('confirmOverlay');

        // Auto-resize textarea
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Enter to send (Shift+Enter for newline)
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function quickCmd(cmd) {
            input.value = cmd;
            sendMessage();
        }

        function showClearConfirm() {
            confirmOverlay.classList.add('active');
        }

        function hideClearConfirm() {
            confirmOverlay.classList.remove('active');
        }

        function clearChat() {
            hideClearConfirm();
            // Clear messages UI only (doesn't erase knowledge)
            const messages = messagesDiv.querySelectorAll('.message');
            messages.forEach(m => m.remove());
            // Show welcome again
            const welcome = document.createElement('div');
            welcome.className = 'welcome';
            welcome.innerHTML = `
                <h2>Welcome to Loom</h2>
                <p>Teach me facts, ask questions, or paste paragraphs. I'll weave them into a connected knowledge graph. Type <b>help</b> for commands.</p>
            `;
            messagesDiv.insertBefore(welcome, typingIndicator);
        }

        function addMessage(content, type) {
            // Remove welcome message if present
            const welcome = messagesDiv.querySelector('.welcome');
            if (welcome) welcome.remove();

            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.innerHTML = content;
            messagesDiv.insertBefore(msg, typingIndicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message.replace(/</g, '&lt;').replace(/>/g, '&gt;'), 'user');
            input.value = '';
            input.style.height = 'auto';

            // Show typing indicator
            typingIndicator.classList.add('active');
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                // Hide typing indicator
                typingIndicator.classList.remove('active');
                sendBtn.disabled = false;

                // Determine message type
                let msgType = 'assistant';
                if (data.type === 'info' || data.type === 'help') {
                    msgType = 'info';
                } else if (data.type === 'error') {
                    msgType = 'error';
                }

                // Add response
                let content = data.response;

                // Add meta badge for paragraph processing
                if (data.meta && data.meta.chunks > 1) {
                    content += `<br><span class="meta-badge">${data.meta.chunks} chunks | ${data.meta.facts_added} facts | theme: ${data.meta.theme || 'general'}</span>`;
                }

                addMessage(content, msgType);

            } catch (error) {
                typingIndicator.classList.remove('active');
                sendBtn.disabled = false;
                addMessage('Connection error. Is the server running?', 'error');
            }
        }

        // Close dialog on overlay click
        confirmOverlay.addEventListener('click', function(e) {
            if (e.target === confirmOverlay) {
                hideClearConfirm();
            }
        });

        // Close dialog on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && confirmOverlay.classList.contains('active')) {
                hideClearConfirm();
            }
        });

        // Focus input on load
        input.focus();
    </script>
</body>
</html>
